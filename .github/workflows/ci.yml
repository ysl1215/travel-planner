# CI — runs on every push and pull request
# Checks that the project builds cleanly and passes the linter.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Provide a dummy key so the build doesn't fail at type-check
      # (the actual key is only needed at runtime, not build time)
      - name: Build
        env:
          OPENROUTER_API_KEY: "ci-placeholder-not-used-at-build-time"
        run: npm run build

      - name: Lint
        run: npm run lint
